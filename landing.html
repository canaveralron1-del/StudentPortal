<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Enrollment Portal</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4f8df5, #6bd6e1);
      color: #fff;
    }
    header {
      padding: 20px;
      text-align: center;
      font-size: 2rem;
      font-weight: bold;
    }
    .glass-card {
      width: 90%;
      max-width: 600px;
      margin: 40px auto;
      padding: 30px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      color: #fff;
      text-align: center;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
    }
    .glass-card h2 {
      margin-bottom: 10px;
    }
    .btn {
      display: inline-block;
      margin-top: 20px;
      background: #fff;
      color: #333;
      padding: 12px 20px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }
    .btn:hover {
      background: #e1e1e1;
    }
    footer {
      margin-top: 40px;
      text-align: center;
      padding: 10px;
      font-size: 0.9rem;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <header>Student Enrollment Portal</header>

  <div class="glass-card">
    <h2>Welcome Students!</h2>
    <p>Enroll for your classes, update your profile, and access your student dashboard.</p>
    <a href="#" class="btn">Proceed to Login</a>
  </div>

  <footer>© 2025 Student Enrollment System</footer>
</body>
</html>
