<!DOCTYPE html>
<html lang="en">
<head>
<link rel="stylesheet" href="design.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Enrollment Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- Navigation Bar -->
<nav>
    <div style="display:flex; align-items:center;">
        <img src="ascot3.png" alt="School Logo">
        <h2>ASCOT — BSIT Enrollment Portal</h2>
    </div>
</nav>

<!-- Two Columns -->
<div class="container">

    <!-- LOGIN CARD -->
    <div class="glass">
        <h2>Student Login</h2>
        <label>Username</label>
        <input type="text" placeholder="Enter username">

        <label>Password</label>
        <input type="password" placeholder="Enter password">

        <button>Log In</button>
    </div>

    <!-- ANNOUNCEMENTS PANEL -->
    <div class="glass">
        <h2>Announcements</h2>

        <div class="announcement-item">📢 Enrollment is now open until April 30.</div>
        <div class="announcement-item">📝 New student orientation scheduled on May 5.</div>
        <div class="announcement-item">🏫 Campus maintenance: no classes next Monday.</div>
    </div>

</div>

</body>
</html>
