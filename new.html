<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Enrollment Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)),
                url('your-background.jpg') center/cover no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: rgba(255,255,255,0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            width: 420px;
            padding: 30px;
            border-radius: 18px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.45);
            box-shadow: 0 8px 25px rgba(0,0,0,0.25);
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
        }

        p {
            color: #f0f0f0;
            margin-bottom: 25px;
            font-size: 15px;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .btn {
            padding: 12px 25px;
            border-radius: 25px;
            border: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-student {
            background: #f28c28;
            color: white;
        }

        .btn-student:hover {
            background: #d97706;
        }

        .btn-admin {
            background: white;
            color: #444;
        }

        .btn-admin:hover {
            background: #e5e5e5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to Enrollment Portal</h1>
        <p>Please choose your access type.</p>

        <div class="btn-group">
            <button class="btn btn-student" onclick="window.location.href='student-login.html'">Student</button>
            <button class="btn btn-admin" onclick="window.location.href='admin-login.html'">Admin</button>
        </div>
    </div>
</body>
</html>
